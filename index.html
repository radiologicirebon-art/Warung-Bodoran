<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARUNG MAS ADE - Semi Minimarket</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{background:#2c3e50;color:white;padding:15px;text-align:center;font-size:20px}
nav{display:flex;gap:10px;padding:10px;background:#34495e}
nav button{flex:1;padding:10px;border:none;background:#2ecc71;color:white;font-weight:bold;cursor:pointer}
section{display:none;padding:15px}
table{width:100%;border-collapse:collapse;margin-top:10px}
table,th,td{border:1px solid #ddd}
th,td{padding:8px;text-align:left}
input,select,button{padding:8px;margin:5px 0}
.card{background:white;padding:15px;margin:10px 0;border-radius:8px}
.total{font-size:20px;font-weight:bold}
</style>
</head>
<body>

<header>🏪 WARUNG MAS ADE - Semi Minimarket</header>

<nav>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('barang')">Master Barang</button>
<button onclick="showPage('kasir')">Kasir</button>
<button onclick="showPage('hutang')">Hutang</button>
</nav>

<section id="dashboard">
<div class="card">
<h3>Total Penjualan Hari Ini</h3>
<div id="totalHariIni" class="total">Rp 0</div>
</div>
</section>

<section id="barang">
<h3>Tambah Barang</h3>
<input id="namaBarang" placeholder="Nama Barang">
<input id="kategori" placeholder="Kategori">
<input id="hargaBeli" type="number" placeholder="Harga Beli">
<input id="hargaJual" type="number" placeholder="Harga Jual">
<input id="stok" type="number" placeholder="Stok">
<input id="barcode" placeholder="Barcode">
<button onclick="tambahBarang()">Simpan</button>

<h3>Daftar Barang</h3>
<table>
<thead>
<tr><th>Nama</th><th>Stok</th><th>Harga</th></tr>
</thead>
<tbody id="tabelBarang"></tbody>
</table>
</section>

<section id="kasir">
<h3>Scan Barcode</h3>
<div id="reader" style="width:300px"></div>
<h3>Keranjang</h3>
<table>
<thead>
<tr><th>Nama</th><th>Qty</th><th>Subtotal</th></tr>
</thead>
<tbody id="keranjang"></tbody>
</table>
<div class="total">Total: Rp <span id="total">0</span></div>
<select id="metode">
<option>Cash</option>
<option>Transfer</option>
<option>Hutang</option>
</select>
<button onclick="simpanTransaksi()">Simpan Transaksi</button>
</section>

<section id="hutang">
<h3>Data Hutang</h3>
<table>
<thead>
<tr><th>Nama</th><th>Sisa</th><th>Status</th></tr>
</thead>
<tbody id="dataHutang"></tbody>
</table>
</section>

<script>
const firebaseConfig = {
databaseURL: "https://warung-mas-ade-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function showPage(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}
showPage('dashboard');

function tambahBarang(){
const id = Date.now();
db.ref("barang/"+id).set({
nama: namaBarang.value,
kategori: kategori.value,
hargaBeli: Number(hargaBeli.value),
hargaJual: Number(hargaJual.value),
stok: Number(stok.value),
barcode: barcode.value
});
alert("Barang disimpan");
}

db.ref("barang").on("value", snap=>{
let html="";
snap.forEach(data=>{
let b=data.val();
html+=`<tr><td>${b.nama}</td><td>${b.stok}</td><td>${b.hargaJual}</td></tr>`;
});
tabelBarang.innerHTML=html;
});

let cart={};
function tambahKeKeranjang(barcode){
db.ref("barang").orderByChild("barcode").equalTo(barcode).once("value",snap=>{
snap.forEach(d=>{
let b=d.val();
if(!cart[d.key]) cart[d.key]={...b,qty:0};
cart[d.key].qty++;
renderCart();
});
});
}

function renderCart(){
let html="";
let total=0;
for(let id in cart){
let item=cart[id];
let sub=item.qty*item.hargaJual;
total+=sub;
html+=`<tr><td>${item.nama}</td><td>${item.qty}</td><td>${sub}</td></tr>`;
}
keranjang.innerHTML=html;
document.getElementById("total").innerText=total;
}

function simpanTransaksi(){
let id=Date.now();
let total=document.getElementById("total").innerText;
db.ref("transaksi/"+id).set({
tanggal:new Date().toLocaleDateString(),
total:Number(total),
metode:metode.value,
items:cart
});
alert("Transaksi disimpan");
cart={};
renderCart();
}

const scanner = new Html5Qrcode("reader");
scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
barcode => tambahKeKeranjang(barcode));
</script>

</body>
</html>
