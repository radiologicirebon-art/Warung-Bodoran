<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Mas Ade</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Inter,system-ui;background:#f4f6f8;margin:0}
header{background:#2e7d32;color:#fff;padding:16px;text-align:center;font-size:22px;font-weight:700}
.container{max-width:1100px;margin:auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.card{background:#fff;border-radius:14px;padding:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);display:flex;flex-direction:column}
.card img{width:100%;height:120px;object-fit:cover;border-radius:10px}
.card h3{font-size:16px;margin:8px 0 4px}
.price{font-weight:700;color:#2e7d32}
button{border:none;border-radius:10px;padding:10px;margin-top:auto;background:#2e7d32;color:#fff;font-weight:600;cursor:pointer}
button.secondary{background:#1565c0}
.cart,.panel{position:fixed;right:0;top:0;width:340px;height:100%;background:#fff;box-shadow:-3px 0 12px rgba(0,0,0,.2);padding:16px;overflow:auto}
.hidden{display:none}
.item{display:flex;justify-content:space-between;margin:6px 0}
input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin:6px 0}
.tabs{display:flex;gap:8px;margin-bottom:10px}
.tabs button{flex:1}
</style>
</head>
<body>
<header>Warung Mas Ade</header>
<div class="container">
<h2>Katalog Barang</h2>
<div id="produk" class="grid"></div>
</div><!-- CART --><div id="cart" class="cart hidden">
<h3>Keranjang</h3>
<div id="cartItems"></div>
<hr>
<input id="nama" placeholder="Nama">
<input id="alamat" placeholder="Alamat">
<select id="metode"><option>Ambil</option><option>Antar</option><option>Bon / Hutang</option></select>
<button onclick="kirimWA()">Kirim Pesanan</button>
<button class="secondary" onclick="toggleCart()">Tutup</button>
</div>
<button style="position:fixed;bottom:20px;right:20px;border-radius:50%;width:60px;height:60px;font-size:22px" onclick="toggleCart()">🛒</button><!-- ADMIN PANEL --><div id="admin" class="panel hidden">
<h3>Admin</h3>
<div class="tabs">
<button onclick="showTab('tambah')">Tambah Barang</button>
<button onclick="showTab('laporan')">Laporan</button>
<button onclick="showTab('bon')">Data Bon</button>
</div>
<div id="tambah">
<input id="pnama" placeholder="Nama barang">
<input id="pharga" type="number" placeholder="Harga">
<input id="pgambar" placeholder="URL gambar">
<button onclick="tambahBarang()">Simpan</button>
</div>
<div id="laporan" class="hidden">
<h4>Laporan Hari Ini</h4>
<div id="laporanIsi"></div>
</div>
<div id="bon" class="hidden">
<h4>Daftar Hutang</h4>
<div id="bonIsi"></div>
</div>
<button onclick="toggleAdmin()">Tutup</button>
</div>
<button style="position:fixed;bottom:20px;left:20px;border-radius:50%;width:60px;height:60px" onclick="toggleAdmin()">⚙️</button><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script><script>
const firebaseConfig={databaseURL:"https://warung-mas-ade-default-rtdb.asia-southeast1.firebasedatabase.app/"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let cart=[];
function rupiah(n){return 'Rp '+Number(n).toLocaleString('id-ID')}
function toggleCart(){document.getElementById('cart').classList.toggle('hidden');renderCart()}
function toggleAdmin(){document.getElementById('admin').classList.toggle('hidden');loadBon();loadLaporan()}
function showTab(id){['tambah','laporan','bon'].forEach(t=>document.getElementById(t).classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}
function addCart(id,nama,harga){const e=cart.find(i=>i.id===id);if(e)e.qty++;else cart.push({id,nama,harga,qty:1});renderCart();}
function renderCart(){const el=document.getElementById('cartItems');el.innerHTML='';cart.forEach(i=>{el.innerHTML+=`<div class='item'><span>${i.nama} x${i.qty}</span><span>${rupiah(i.qty*i.harga)}</span></div>`})}
function kirimWA(){const nama=document.getElementById('nama').value;const alamat=document.getElementById('alamat').value;const metode=document.getElementById('metode').value;let total=0;let text=`Pesanan Warung Mas Ade%0A`;
cart.forEach(i=>{text+=`- ${i.nama} x${i.qty}%0A`;total+=i.qty*i.harga});text+=`Total: ${total}`;
const today=new Date().toISOString().slice(0,10);
db.ref('orders/'+today).push({nama,alamat,metode,cart,total});
if(metode==='Bon / Hutang')db.ref('bon/'+nama).transaction(v=>(v||0)+total);
window.open(`https://wa.me/6280000000000?text=${text}`,'_blank');cart=[];renderCart();}
function loadProduk(){db.ref('produk').on('value',snap=>{const data=snap.val()||{};const c=document.getElementById('produk');c.innerHTML='';Object.keys(data).forEach(k=>{const p=data[k];c.innerHTML+=`<div class='card'><img src='${p.gambar||"https://via.placeholder.com/200"}'><h3>${p.nama}</h3><div class='price'>${rupiah(p.harga)}</div><button onclick="addCart('${k}','${p.nama}',${p.harga})">Tambah</button></div>`})})}
function tambahBarang(){const nama=document.getElementById('pnama').value;const harga=document.getElementById('pharga').value;const gambar=document.getElementById('pgambar').value;db.ref('produk').push({nama,harga:Number(harga),gambar});alert('Tersimpan')}
function loadBon(){db.ref('bon').on('value',s=>{const d=s.val()||{};let html='';Object.keys(d).forEach(n=>html+=`<div class='item'><span>${n}</span><span>${rupiah(d[n])}</span></div>`);document.getElementById('bonIsi').innerHTML=html})}
function loadLaporan(){const today=new Date().toISOString().slice(0,10);db.ref('orders/'+today).on('value',s=>{let total=0,count=0; s.forEach(c=>{total+=c.val().total;count++});document.getElementById('laporanIsi').innerHTML=`Transaksi: ${count}<br>Total: ${rupiah(total)}`})}
loadProduk();
</script></body>
</html>
