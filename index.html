<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARUNG MAS ADE PRO MAX</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#111827;color:white;padding:15px;text-align:center}
nav{display:flex;gap:5px;background:#1f2937;padding:8px}
nav button{flex:1;padding:10px;border:none;background:#10b981;color:white;border-radius:6px}
section{display:none;padding:12px}
.card{background:white;padding:12px;margin-bottom:12px;border-radius:10px}
input{width:100%;padding:8px;margin:5px 0}
.login-box{max-width:350px;margin:80px auto;background:white;padding:20px;border-radius:12px}
.logout{background:red !important}
.hidden{display:none !important}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
<h3>Login Sistem</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginError" style="color:red"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">
<header>
🏪 WARUNG MAS ADE
<button onclick="logout()" class="logout">Logout</button>
</header>

<nav>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('barang')" id="menuBarang">Master Barang</button>
<button onclick="showPage('kasir')">Kasir</button>
</nav>

<section id="dashboard">
<div class="card">
<h3>Total Penjualan</h3>
<div id="totalPenjualan">Rp 0</div>
</div>
<canvas id="grafik"></canvas>
</section>

<section id="barang">
<div class="card">
<h3>Tambah Barang</h3>
<input id="nama" placeholder="Nama">
<input id="harga" type="number" placeholder="Harga">
<input id="stok" type="number" placeholder="Stok">
<input id="barcode" placeholder="Barcode">
<button onclick="tambahBarang()">Simpan</button>
</div>
<div class="card">
<table width="100%">
<thead><tr><th>Nama</th><th>Stok</th></tr></thead>
<tbody id="listBarang"></tbody>
</table>
</div>
</section>

<section id="kasir">
<div class="card">
<input id="scanManual" placeholder="Scan Barcode">
<button onclick="scanManualBarcode()">Tambah</button>
</div>
<div class="card">
<table width="100%">
<thead><tr><th>Nama</th><th>Qty</th></tr></thead>
<tbody id="cart"></tbody>
</table>
<div>Total: Rp <span id="total">0</span></div>
<button onclick="simpanTransaksi()">Simpan</button>
</div>
</section>
</div>

<script>
firebase.initializeApp({
databaseURL:"https://warung-mas-ade-default-rtdb.asia-southeast1.firebasedatabase.app/"
});
const db=firebase.database();

/* ================= SESSION CHECK ================= */

window.onload=function(){
let session=localStorage.getItem("user");
if(session){
initApp(JSON.parse(session));
}
};

/* ================= LOGIN ================= */

function login(){
db.ref("users").once("value",snap=>{
let found=false;

snap.forEach(d=>{
let u=d.val();
if(u.username===username.value && u.password===password.value){
found=true;
localStorage.setItem("user",JSON.stringify(u));
initApp(u);
}
});

if(!found){
loginError.innerText="Login gagal!";
}
});
}

function initApp(user){
loginPage.style.display="none";
app.style.display="block";
showPage("dashboard");

/* Role Control */
if(user.role==="kasir"){
menuBarang.classList.add("hidden");
}else{
menuBarang.classList.remove("hidden");
}
}

/* ================= LOGOUT ================= */

function logout(){
localStorage.removeItem("user");
location.reload();
}

/* ================= NAV ================= */

function showPage(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

/* ================= MASTER BARANG ================= */

function tambahBarang(){
let id=Date.now();
db.ref("barang/"+id).set({
nama:nama.value,
harga:Number(harga.value),
stok:Number(stok.value),
barcode:barcode.value
});
alert("Barang disimpan");
}

db.ref("barang").on("value",snap=>{
let html="";
snap.forEach(d=>{
let b=d.val();
html+=`<tr><td>${b.nama}</td><td>${b.stok}</td></tr>`;
});
listBarang.innerHTML=html;
});

/* ================= KASIR ================= */

let cartData={};

function scanManualBarcode(){
let code=scanManual.value;
db.ref("barang").orderByChild("barcode").equalTo(code).once("value",snap=>{
if(!snap.exists()){alert("Tidak ditemukan");return;}
snap.forEach(d=>{
let b=d.val();
if(!cartData[d.key]) cartData[d.key]={...b,qty:0};
cartData[d.key].qty++;
renderCart();
});
});
}

function renderCart(){
let html="",total=0;
for(let id in cartData){
let item=cartData[id];
total+=item.qty*item.harga;
html+=`<tr><td>${item.nama}</td><td>${item.qty}</td></tr>`;
}
cart.innerHTML=html;
document.getElementById("total").innerText=total;
}

function simpanTransaksi(){
let id=Date.now();
let total=Number(document.getElementById("total").innerText);

db.ref("transaksi/"+id).set({
tanggal:new Date().toISOString(),
total:total
});

for(let key in cartData){
let item=cartData[key];
db.ref("barang/"+key+"/stok").transaction(s=>s-item.qty);
}

cartData={};
renderCart();
alert("Transaksi sukses");
}

/* ================= DASHBOARD ================= */

let chart;
db.ref("transaksi").on("value",snap=>{
let total=0,data={};

snap.forEach(d=>{
let t=d.val();
total+=t.total;
let tgl=t.tanggal.slice(0,10);
if(!data[tgl]) data[tgl]=0;
data[tgl]+=t.total;
});

totalPenjualan.innerText="Rp "+total;
updateChart(data);
});

function updateChart(data){
let ctx=document.getElementById("grafik");
if(chart) chart.destroy();
chart=new Chart(ctx,{
type:"line",
data:{
labels:Object.keys(data),
datasets:[{label:"Penjualan",data:Object.values(data)}]
}
});
}
</script>

</body>
</html>
